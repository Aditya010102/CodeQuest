<h1>

    Quiz Result

</h1>

<div class="result-page">


    <div class="card">

        <h2>

            Score

        </h2>

        <h1>

            {{result.score}}

            /

            {{result.totalQuestions}}

        </h1>

        <p>

            Percentage

            {{result.percentage}}%

        </p>

        <p>

            Correct

            {{result.correctAnswers}}

        </p>

        <p>

            Wrong

            {{result.wrongAnswers}}

        </p>

        <p>

            Attempted

            {{result.attemptedQuestions}}

        </p>

        <a routerLink="/dashboard">

            Back To Dashboard

        </a>

    </div>

</div>
